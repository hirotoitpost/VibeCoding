version: '3.8'

# IoT センサーシミュレーター - Docker Compose 設定
# 実行: docker-compose up -d
# 停止: docker-compose down

services:
  # ============================================================
  # MQTT ブローカー（Mosquitto）
  # ============================================================
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mosquitto
    ports:
      - "1883:1883"           # MQTT - 非暗号化
      - "8883:8883"           # MQTT - TLS/SSL
      - "9001:9001"           # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    environment:
      - TZ=Asia/Tokyo
    networks:
      - iot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "test"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # センサーシミュレーター（バックグラウンド）
  # ============================================================
  sensor_simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: iot_sensor_simulator
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - SENSOR_INTERVAL=5
      - SENSOR_ROOMS=room1,room2,room3
      - TEMP_MIN=10
      - TEMP_MAX=35
      - HUMIDITY_MIN=20
      - HUMIDITY_MAX=95
      - LOG_LEVEL=INFO
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - iot-network
    restart: unless-stopped
    command: ["python", "-m", "src.simulator_main"]

  # ============================================================
  # Web アプリケーション（Flask Dashboard）
  # ============================================================
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: iot_webapp
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=true
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - DATABASE_URL=sqlite:///sensor_data.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - LOG_LEVEL=INFO
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - iot-network
    restart: unless-stopped
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0"]

networks:
  iot-network:
    driver: bridge

volumes:
  mosquitto-data:
    driver: local

# ============================================================
# 起動コマンド
# ============================================================
# docker-compose up -d           : 全サービス起動
# docker-compose down             : 全サービス停止
# docker-compose logs -f webapp   : Flask ログ監視
# docker-compose logs -f mosquitto : MQTT ログ監視
# docker-compose ps              : サービス状態確認
# ============================================================

# ============================================================
# 検証方法
# ============================================================
# 1. MQTT 接続確認:
#    docker exec -it iot_mosquitto mosquitto_sub -h localhost -t "sensor/+"
#
# 2. Flask ダッシュボード:
#    http://localhost:5000
#
# 3. MQTT トピック確認:
#    mosquitto_pub -h localhost -t sensor/test -m "Hello"
# ============================================================
