user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream iot_webapp {
        server webapp:5000;
    }

    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }

        location = /iot {
            return 301 /iot/;
        }

        # Flask static files: url_for('static', ...) generates /static/...
        location /static/ {
            proxy_pass http://iot_webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Flask API: JS calls /api/... as absolute path from /iot/ page
        location /api/ {
            proxy_pass http://iot_webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Main path: strip /iot prefix and forward to Flask
        location /iot/ {
            rewrite ^/iot(/.*)$ $1 break;
            proxy_pass http://iot_webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
