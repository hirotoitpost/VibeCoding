# Mosquitto Configuration
# MQTT ブローカー設定

# =================================================================
# Default listener
# =================================================================
listener 1883
protocol mqtt

# WebSocket リスナー
listener 9001
protocol websockets

# =================================================================
# Security
# =================================================================
allow_anonymous true

# =================================================================
# Logging
# =================================================================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# =================================================================
# Persistence
# =================================================================
persistence true
persistence_location /mosquitto/data/

# =================================================================
# Message Settings
# =================================================================
max_queued_messages 1000
message_size_limit 0
