# Mosquitto Configuration - Smart Home IoT Hub
# Reference: https://mosquitto.org/man/mosquitto-conf-5.html

# ============================================================================
# Default listener - Port 1883
# ============================================================================
listener 1883
protocol mqtt

# ============================================================================
# Persistence
# ============================================================================
persistence true
persistence_location /mosquitto/data/

# ============================================================================
# Logging
# ============================================================================
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_timestamp true
log_type all

# ============================================================================
# Security (Demo: No authentication for simplicity)
# Note: In production, enable:
#   - password_file /path/to/passwd
#   - require_certificate true
# ============================================================================
allow_anonymous true

# ============================================================================
# Message limits
# ============================================================================
max_connections -1
max_queued_messages 1000
message_size_limit 0

# ============================================================================
# Default ACL (Allow all for demo)
# ============================================================================
# acl_file /mosquitto/config/acl.txt
