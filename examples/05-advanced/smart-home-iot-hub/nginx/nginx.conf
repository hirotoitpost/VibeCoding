user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream smarthome_api {
        server api:5000;
    }

    upstream smarthome_frontend {
        server frontend:3000;
    }

    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }

        location = /smarthome {
            return 301 /smarthome/;
        }

        # API calls: fetch('/api/...') generates absolute /api/... path
        location /api/ {
            proxy_pass http://smarthome_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Frontend: Vite with base '/smarthome/'
        location /smarthome/ {
            proxy_pass http://smarthome_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
