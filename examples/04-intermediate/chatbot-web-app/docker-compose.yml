version: '3.8'

services:
  # Flask バックエンド
  backend:
    image: python:3.11-slim
    container_name: chatbot-backend
    working_dir: /app
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt && python server.py"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - chatbot-network
    restart: unless-stopped

  # React + Vite フロントエンド
  frontend:
    image: node:18-alpine
    container_name: chatbot-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chatbot-network
    restart: unless-stopped

  # API Gateway（nginx）
  # ポート 8082: http://localhost:8082/chatbot/
  gateway:
    image: nginx:alpine
    container_name: chatbot-gateway
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - chatbot-network
    restart: unless-stopped

volumes:
  frontend_node_modules:

networks:
  chatbot-network:
    driver: bridge
