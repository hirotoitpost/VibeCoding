version: '3.8'

services:
  # DNS Service (dnsmasq)
  # 開発環境用ローカルDNS: *.local ドメインを localhost に解決
  dnsmasq:
    image: jpillora/dnsmasq:latest
    container_name: web-accounting-dns
    ports:
      - "53:53/udp"
    volumes:
      - ./nginx/dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      - accounting-network
    restart: unless-stopped

  # API Gateway (nginx)
  # ホストのポート 80 を通じてサービスをルーティング
  # ブラウザからは http://web-accounting-app.local にアクセス
  gateway:
    image: nginx:alpine
    container_name: web-accounting-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - accounting-network
    restart: unless-stopped

  # バックエンド (Node.js + Express + SQLite)
  server:
    image: node:18-alpine
    container_name: web-accounting-server
    working_dir: /app/server
    environment:
      - NODE_ENV=production
      - SERVER_PORT=5000
    volumes:
      - ./server:/app/server
      - server_node_modules:/app/server/node_modules
    command: >
      sh -c "npm install && npm start"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accounting-network
    restart: unless-stopped

  # フロントエンド (React + Vite)
  client:
    image: node:18-alpine
    container_name: web-accounting-client
    working_dir: /app/client
    environment:
      # API Gateway 経由でアクセス（nginx port 8080 / /accounting パス経由）
      - VITE_API_URL=http://localhost:8080/accounting
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - accounting-network
    restart: unless-stopped

volumes:
  server_node_modules:
  client_node_modules:

networks:
  accounting-network:
    driver: bridge
