version: '3.8'

services:
  # バックエンド (Node.js + Express + SQLite)
  server:
    image: node:18-alpine
    container_name: web-accounting-server
    working_dir: /app/server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - SERVER_PORT=5000
    volumes:
      - ./server:/app/server
      - server_node_modules:/app/server/node_modules
    command: >
      sh -c "npm install && npm start"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accounting-network

  # フロントエンド (React + Vite)
  client:
    image: node:18-alpine
    container_name: web-accounting-client
    working_dir: /app/client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - accounting-network

volumes:
  server_node_modules:
  client_node_modules:

networks:
  accounting-network:
    driver: bridge
