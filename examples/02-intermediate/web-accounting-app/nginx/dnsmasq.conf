# dnsmasq configuration for local development

# Listen on port 53 for DNS queries
port=53

# Log queries (useful for debugging)
log-queries
# log-facility=/var/log/dnsmasq.log

# Never forward plain names (without a dot or domain part)
domain-needed

# Never forward addresses in the non-routed address spaces
bogus-priv

# Local domain resolution for development
# All requests to *.local resolve to 127.0.0.1 (localhost)
address=/web-accounting-app.local/127.0.0.1
address=/localhost.local/127.0.0.1

# API subdomain
address=/api.web-accounting-app.local/127.0.0.1
address=/client.web-accounting-app.local/127.0.0.1

# Default upstream DNS servers (Google Public DNS and 1.1.1.1)
nameserver=8.8.8.8
nameserver=1.1.1.1
